<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" fill="none">
  <!-- 建物本体 -->
  <rect x="36" y="80" width="168" height="120" rx="3" fill="#e8f4fa" stroke="#006ba1" stroke-width="2"/>
  <!-- 屋根 -->
  <polygon points="26,80 120,34 214,80" fill="#e8f4fa" stroke="#006ba1" stroke-width="2" stroke-linejoin="round"/>
  <!-- 建物の柱線 -->
  <line x1="92" y1="80" x2="92" y2="200" stroke="#006ba1" stroke-width="1.2" opacity="0.3"/>
  <line x1="148" y1="80" x2="148" y2="200" stroke="#006ba1" stroke-width="1.2" opacity="0.3"/>
  <!-- 窓(左) -->
  <rect x="48" y="96" width="34" height="32" rx="2" fill="#e8f4fa" stroke="#006ba1" stroke-width="1.5"/>
  <line x1="65" y1="96" x2="65" y2="128" stroke="#006ba1" stroke-width="1.2"/>
  <line x1="48" y1="112" x2="82" y2="112" stroke="#006ba1" stroke-width="1.2"/>
  <!-- フィルム(左窓) -->
  <rect x="50" y="98" width="13" height="12" fill="#3EA876" fill-opacity="0.12"/>
  <rect x="67" y="98" width="13" height="12" fill="#3EA876" fill-opacity="0.12"/>
  <!-- 窓(右) -->
  <rect x="158" y="96" width="34" height="32" rx="2" fill="#e8f4fa" stroke="#006ba1" stroke-width="1.5"/>
  <line x1="175" y1="96" x2="175" y2="128" stroke="#006ba1" stroke-width="1.2"/>
  <line x1="158" y1="112" x2="192" y2="112" stroke="#006ba1" stroke-width="1.2"/>
  <!-- フィルム(右窓) -->
  <rect x="160" y="98" width="13" height="12" fill="#3EA876" fill-opacity="0.12"/>
  <rect x="177" y="98" width="13" height="12" fill="#3EA876" fill-opacity="0.12"/>
  <!-- ドア -->
  <rect x="96" y="148" width="48" height="52" rx="2" fill="#c8dde8" stroke="#006ba1" stroke-width="1.5"/>
  <circle cx="138" cy="176" r="3" fill="#006ba1" opacity="0.6"/>
  <!-- 卒業帽 -->
  <polygon points="120,28 140,36 120,44 100,36" fill="#006ba1" opacity="0.85"/>
  <line x1="120" y1="44" x2="120" y2="56" stroke="#006ba1" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="140" y1="36" x2="140" y2="48" stroke="#3EA876" stroke-width="1.8" stroke-linecap="round"/>
  <circle cx="140" cy="50" r="3" fill="#3EA876"/>
  <!-- ACADEMY テキスト -->
  <text x="120" y="144" text-anchor="middle" font-size="9" font-family="Arial,sans-serif" font-weight="700" fill="#3EA876" letter-spacing="2" opacity="0.7">ACADEMY</text>
  <!-- 講師シルエット(左・入口前) -->
  <circle cx="82" cy="176" r="8" fill="#006ba1" opacity="0.55"/>
  <path d="M82 184 L82 200" stroke="#006ba1" stroke-width="2.5" stroke-linecap="round" opacity="0.55"/>
  <path d="M74 192 L90 192" stroke="#006ba1" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
  <!-- 受講者シルエット(右) -->
  <circle cx="162" cy="178" r="7" fill="#006ba1" opacity="0.35"/>
  <path d="M162 185 L162 200" stroke="#006ba1" stroke-width="2.2" stroke-linecap="round" opacity="0.35"/>
  <path d="M155 192 L169 192" stroke="#006ba1" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
  <!-- バッジ -->
  <circle cx="192" cy="86" r="16" fill="#3EA876" opacity="0.15" stroke="#3EA876" stroke-width="1.2"/>
  <text x="192" y="83" text-anchor="middle" font-size="9" font-family="Arial,sans-serif" font-weight="700" fill="#3EA876">未経験</text>
  <text x="192" y="94" text-anchor="middle" font-size="9" font-family="Arial,sans-serif" font-weight="700" fill="#3EA876">OK</text>
</svg>
