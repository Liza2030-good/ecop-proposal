<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" fill="none">
  <!-- 木(左) -->
  <rect x="26" y="140" width="6" height="46" rx="3" fill="#c8dde8" opacity="0.6"/>
  <ellipse cx="29" cy="128" rx="18" ry="20" fill="#3EA876" opacity="0.22"/>
  <ellipse cx="22" cy="136" rx="12" ry="14" fill="#3EA876" opacity="0.28"/>
  <ellipse cx="38" cy="134" rx="14" ry="16" fill="#3EA876" opacity="0.2"/>
  <!-- 木(右) -->
  <rect x="208" y="148" width="6" height="38" rx="3" fill="#c8dde8" opacity="0.6"/>
  <ellipse cx="211" cy="136" rx="16" ry="18" fill="#3EA876" opacity="0.22"/>
  <ellipse cx="204" cy="144" rx="11" ry="13" fill="#3EA876" opacity="0.28"/>
  <ellipse cx="220" cy="142" rx="12" ry="14" fill="#3EA876" opacity="0.2"/>
  <!-- 中央窓 -->
  <rect x="80" y="60" width="80" height="100" rx="3" fill="#e8f4fa" stroke="#006ba1" stroke-width="2"/>
  <line x1="120" y1="60" x2="120" y2="160" stroke="#006ba1" stroke-width="1.6"/>
  <line x1="80" y1="110" x2="160" y2="110" stroke="#006ba1" stroke-width="1.6"/>
  <!-- フィルム層 -->
  <rect x="82" y="62" width="36" height="46" fill="#3EA876" fill-opacity="0.1"/>
  <rect x="122" y="62" width="36" height="46" fill="#3EA876" fill-opacity="0.1"/>
  <rect x="82" y="112" width="36" height="46" fill="#3EA876" fill-opacity="0.1"/>
  <rect x="122" y="112" width="36" height="46" fill="#3EA876" fill-opacity="0.1"/>
  <!-- ハイライト -->
  <rect x="86" y="66" width="4" height="20" rx="2" fill="white" opacity="0.45" transform="rotate(-8 88 76)"/>
  <!-- リサイクル矢印(窓の周り) -->
  <!-- 上弧 -->
  <path d="M76 80 A54 54 0 0 1 164 80" stroke="#3EA876" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.75"/>
  <polygon points="164,80 170,72 172,84" fill="#3EA876" opacity="0.75"/>
  <!-- 右下弧 -->
  <path d="M164 80 A54 54 0 0 1 120 152" stroke="#3EA876" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.75"/>
  <polygon points="120,152 112,156 124,160" fill="#3EA876" opacity="0.75"/>
  <!-- 左下弧 -->
  <path d="M120 152 A54 54 0 0 1 76 80" stroke="#3EA876" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.75"/>
  <polygon points="76,80 68,84 70,72" fill="#3EA876" opacity="0.75"/>
  <!-- CO2ダウンバッジ -->
  <rect x="148" y="168" width="68" height="24" rx="6" fill="#3EA876" opacity="0.15"/>
  <text x="182" y="184" text-anchor="middle" font-size="10" font-family="Arial,sans-serif" font-weight="700" fill="#3EA876">CO2 DOWN</text>
  <!-- 葉アクセント -->
  <path d="M120 44 Q128 36 126 50 Q120 50 120 44 Z" fill="#3EA876" opacity="0.75"/>
  <path d="M120 44 Q118 50 122 52" stroke="#006ba1" stroke-width="0.8" fill="none" stroke-linecap="round" opacity="0.5"/>
  <!-- 人物(左 窓見ている) -->
  <circle cx="58" cy="118" r="7" fill="#006ba1" opacity="0.28"/>
  <path d="M58 125 L58 142" stroke="#006ba1" stroke-width="2.2" stroke-linecap="round" opacity="0.28"/>
  <path d="M52 133 L64 133" stroke="#006ba1" stroke-width="1.8" stroke-linecap="round" opacity="0.28"/>
</svg>
